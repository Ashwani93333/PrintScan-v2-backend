spring:
  application:
    name: printease-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 150MB

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
